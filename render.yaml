services:
  - type: web
    name: kendmart-backend
    env: node
    region: frankfurt
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: node server.js
    healthCheckPath: /api/settings
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: NODE_VERSION
        value: "20"
